version: "3.9"

services:
  # ── Data database (your dummy sales data) ──────────────────────────────────
  data-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salesdb
      POSTGRES_USER: salesuser
      POSTGRES_PASSWORD: salespass
    volumes:
      - data-db-vol:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesuser -d salesdb"]
      interval: 5s
      retries: 10

  # ── Superset metadata database ─────────────────────────────────────────────
  superset-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset-db-vol:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      retries: 10

  # ── Redis (Superset cache + Celery) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-vol:/data

  # ── Apache Superset ────────────────────────────────────────────────────────
  superset:
    build: ./superset
    depends_on:
      superset-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SUPERSET_SECRET_KEY: "thisISaSECRET_1234"
      GUEST_TOKEN_JWT_SECRET: "guest-token-secret-change-me"
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset@superset-db/superset
      REDIS_URL: redis://redis:6379/0
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      PYTHONPATH: /app
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py:ro
    ports:
      - "8088:8088"
    command: [
      "bash", "-c",
      "superset db upgrade && superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin && superset init && gunicorn --bind 0.0.0.0:8088 --workers 2 --timeout 120 'superset.app:create_app()'"
    ]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Go backend (guest token proxy) ─────────────────────────────────────────
  backend:
    build: ./backend
    depends_on:
      superset:
        condition: service_healthy
    environment:
      SUPERSET_URL: http://superset:8088
      SUPERSET_ADMIN_USER: admin
      SUPERSET_ADMIN_PASS: admin
      GUEST_DASHBOARD_ID: ""   # fill after creating dashboard in Superset UI
      PORT: 3000
    ports:
      - "3000:3000"

  # ── Svelte frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: dev
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: http://localhost:3000
      VITE_SUPERSET_URL: http://localhost:8088
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  data-db-vol:
  superset-db-vol:
  redis-vol:
